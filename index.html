<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">
<meta name="description" content="Byproduct nutrient analysis summary. Summarized by Wes W. Gentry, Ph.D.">
<title>Byproduct Summary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    color-scheme: light;
    --paper:#fefcf8;
    --card:#ffffff;
    --field:#ffffff;
    --ink:#221c10;
    --ink-soft:#6b6150;
    --rule:#e6e1d3;
    --rule-soft:#f0ebd9;
    --accent:#e8b923;
    --accent-deep:#7b5e0a;
    --accent-wash:#f7eed4;
  }
  *{box-sizing:border-box;}
  html,body{overflow-x:hidden;max-width:100%;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans',sans-serif;
    font-size:15px;
    line-height:1.45;
    padding:16px;
    padding-bottom:40px;
    -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:720px;margin:0 auto;}
  header{background:var(--accent);border-radius:8px;padding:14px 16px;margin-bottom:18px;}
  header h1{font-family:'Fraunces',serif;font-weight:800;font-size:27px;line-height:1.05;margin:0 0 4px 0;letter-spacing:-0.01em;color:var(--ink);}
  header .sub{font-size:12.5px;color:var(--ink);opacity:0.75;font-style:italic;}

  section.card{background:var(--card);border:1px solid var(--rule);border-radius:8px;padding:13px 15px;margin-bottom:12px;}
  .tier-label{display:flex;align-items:center;gap:8px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);font-weight:600;margin-bottom:9px;font-style:normal;}
  .tier-num{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;background:var(--accent);color:var(--ink);font-size:10px;font-weight:700;font-family:'IBM Plex Mono',monospace;flex-shrink:0;}

  .seg{display:flex;border:1.5px solid var(--ink);border-radius:7px;overflow:hidden;}
  .seg button{flex:1;padding:10px 8px;border:none;background:var(--field);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .seg button.active{background:var(--accent);color:var(--ink);}
  .seg button + button{border-left:1.5px solid var(--ink);}
  .seg button:focus-visible{outline:2px solid var(--accent-deep);outline-offset:-2px;}

  select, input[type=date]{
    width:100%;
    padding:9px 10px;
    border:1px solid var(--rule);
    border-radius:6px;
    background:var(--field);
    color:var(--ink);
    font-family:'IBM Plex Sans',sans-serif;
    font-size:14px;
    -webkit-appearance:none;
    appearance:none;
  }
  select:focus-visible, input[type=date]:focus-visible{outline:2px solid var(--accent-deep);outline-offset:1px;}
  .date-row{display:flex;gap:10px;}
  .date-row > div{flex:1;min-width:0;}
  .date-row label{display:block;font-size:11px;color:var(--ink-soft);margin-bottom:4px;}
  .tier-note{font-size:11px;color:var(--ink-soft);margin-top:7px;font-style:italic;}

  .meta-row{display:flex;justify-content:space-between;align-items:baseline;margin:2px 2px 10px 2px;font-size:12px;color:var(--ink-soft);}
  .meta-row .basis{font-family:'IBM Plex Mono',monospace;font-size:11px;background:var(--accent-wash);padding:2px 7px;border-radius:4px;color:var(--accent-deep);}

  .table-scroll{overflow-x:auto;overflow-y:auto;max-height:64vh;border:1px solid var(--rule);border-radius:8px;-webkit-overflow-scrolling:touch;max-width:100%;}
  table.data-table{border-collapse:collapse;width:100%;background:var(--card);font-family:'IBM Plex Mono',monospace;font-size:12.5px;white-space:nowrap;}
  .data-table th, .data-table td{padding:8px 11px;text-align:right;border-bottom:1px solid var(--rule-soft);}
  .data-table thead th{background:var(--accent-wash);font-family:'IBM Plex Sans',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--accent-deep);font-weight:700;text-align:right;position:sticky;top:0;z-index:2;}
  .data-table td{color:var(--ink);}
  .data-table th:first-child, .data-table td:first-child{text-align:left;position:sticky;left:0;background:var(--card);z-index:1;font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:12.5px;}
  .data-table thead th:first-child{background:var(--accent-wash);z-index:3;}
  .data-table td:nth-child(2){color:var(--ink-soft);}
  .data-table tbody tr:last-child td{border-bottom:none;}
  .data-table tr.alt td{background:var(--paper);}
  .data-table tr.plant-row{cursor:pointer;}
  .data-table tr.plant-row:active td{background:var(--accent-wash);}
  .chevron{display:inline-block;width:10px;font-size:9px;color:var(--accent-deep);transition:transform 0.15s ease;}
  .data-table tr.plant-row.expanded .chevron{transform:rotate(90deg);}
  .data-table tr.detail-row td{background:var(--rule-soft);color:var(--ink-soft);font-size:11px;}
  .data-table tr.detail-row td:first-child{background:var(--rule-soft);font-family:'IBM Plex Mono',monospace;font-weight:400;font-size:11px;color:var(--ink-soft);padding-left:22px;}
  tr.grand-total td{font-weight:700;border-top:2px solid var(--ink);background:var(--accent-wash);}
  tr.grand-total td:first-child{background:var(--accent-wash);}

  .empty-state{padding:22px 10px;text-align:center;color:var(--ink-soft);font-size:13px;}

  footer{margin-top:16px;font-size:11px;color:var(--ink-soft);text-align:center;}
  .login-wrap{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:20px 0;}
  .login-box{width:100%;max-width:340px;background:var(--card);border:1px solid var(--rule);border-radius:12px;padding:28px 24px;text-align:center;}
  .login-box h1{font-family:'Fraunces',serif;font-weight:800;font-size:22px;margin:0 0 4px;color:var(--ink);}
  .login-box .sub{font-size:12px;color:var(--ink-soft);margin-bottom:20px;}
  .login-box input{width:100%;padding:11px 12px;margin-bottom:10px;border:1px solid var(--rule);border-radius:7px;background:var(--field);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;font-size:14px;}
  .login-box button{width:100%;padding:11px;border:none;border-radius:7px;background:var(--accent);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;margin-top:4px;}
  .login-box button:disabled{opacity:0.6;cursor:default;}
  .login-error{color:#a0341e;font-size:12px;margin-top:10px;min-height:15px;}
  .login-loading{font-size:12px;color:var(--ink-soft);margin-top:10px;min-height:15px;}
  .signed-out{display:none;}
  .app-hidden{display:none;}
  .logout-row{text-align:center;margin-top:14px;}
  .logout-row button{background:none;border:none;color:var(--ink-soft);font-family:'IBM Plex Sans',sans-serif;font-size:11.5px;text-decoration:underline;cursor:pointer;padding:4px;}
</style>
</head>
<body>
<div class="wrap">

  <div class="login-wrap" id="loginWrap">
    <div class="login-box">
      <h1>Byproduct Summary</h1>
      <div class="sub">Sign in to view</div>
      <input type="email" id="loginEmail" placeholder="Email" autocomplete="username">
      <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
      <button id="loginBtn" type="button">Log in</button>
      <div class="login-error" id="loginError"></div>
      <div class="login-loading" id="loginLoading"></div>
    </div>
  </div>

  <div id="appRoot" class="app-hidden">

  <header>
    <h1>Byproduct Summary</h1>
    <div class="sub">Summarized by Wes W. Gentry, Ph.D.</div>
  </header>


  <section class="card">
    <div class="tier-label"><span class="tier-num">1</span>Byproduct Type</div>
    <div class="seg" id="typeSeg">
      <button type="button" data-type="WDGS" class="active">WDGS</button>
      <button type="button" data-type="WCGF">WCGF</button>
    </div>
  </section>

  <section class="card">
    <div class="tier-label"><span class="tier-num">2</span>Year</div>
    <select id="yearSel"></select>
  </section>

  <section class="card">
    <div class="tier-label"><span class="tier-num">3</span>Date Range</div>
    <div class="date-row">
      <div><label for="dateStart">From</label><input type="date" id="dateStart"></div>
      <div><label for="dateEnd">To</label><input type="date" id="dateEnd"></div>
    </div>
    <div class="tier-note">Narrows within the year selected above.</div>
  </section>

  <section class="card">
    <div class="tier-label"><span class="tier-num">4</span>State</div>
    <select id="stateSel"></select>
  </section>

  <section class="card">
    <div class="tier-label"><span class="tier-num">5</span>Specific Plant</div>
    <select id="plantSel"></select>
  </section>

  <div class="meta-row">
    <span id="resultSummary"></span>
    <span class="basis">DM basis</span>
  </div>

  <div class="table-scroll">
    <table class="data-table" id="dataTable">
      <thead><tr>
        <th>Plant</th><th>N</th><th>DM</th><th>CP</th><th>ADF</th><th>NDF</th><th>Fat</th><th>Ash</th><th>Ca</th><th>P</th><th>Mg</th><th>K</th><th>S</th>
      </tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <footer>Nutrient values are percent of dry matter.</footer>
  <div class="logout-row"><button id="logoutBtn" type="button">Log out</button></div>

  </div>
</div>

<script>
let DATA = [];

const NUTRIENTS = ['DM','CP','ADF','NDF','Crude Fat','Ash','Ca','P','Mg','K','S'];
const NUTRIENT_LABELS = {'DM':'DM','CP':'CP','ADF':'ADF','NDF':'NDF','Crude Fat':'Fat','Ash':'Ash','Ca':'Ca','P':'P','Mg':'Mg','K':'K','S':'S'};

let state = { type: 'WDGS', year: 'All', dateStart: null, dateEnd: null, state: 'All', plant: 'All' };
let expandedPlants = new Set();

function typeFiltered(type){ return DATA.filter(r => r.Type === type); }

function boundsFor(type, year){
  let rows = typeFiltered(type);
  if (year !== 'All') rows = rows.filter(r => r.Year === year);
  const dates = rows.map(r => r.Date).sort();
  return { min: dates[0], max: dates[dates.length-1] };
}

function currentFilteredRows(exclude){
  exclude = exclude || {};
  let rows = typeFiltered(state.type);
  if (state.year !== 'All') rows = rows.filter(r => r.Year === state.year);
  if (state.dateStart) rows = rows.filter(r => r.Date >= state.dateStart);
  if (state.dateEnd) rows = rows.filter(r => r.Date <= state.dateEnd);
  if (!exclude.state && state.state !== 'All') rows = rows.filter(r => r.State === state.state);
  if (!exclude.plant && state.plant !== 'All') rows = rows.filter(r => r.Plant === state.plant);
  return rows;
}

function mean(vals){
  const v = vals.filter(x => x !== null && x !== undefined);
  return v.length ? v.reduce((a,b)=>a+b,0)/v.length : null;
}

function aggregateByPlant(rows){
  const groups = new Map();
  for (const r of rows){
    if (!groups.has(r.Plant)) groups.set(r.Plant, []);
    groups.get(r.Plant).push(r);
  }
  const out = [];
  for (const [plant, gRows] of groups){
    const entry = { plant, count: gRows.length };
    for (const nut of NUTRIENTS) entry[nut] = mean(gRows.map(r => r[nut]));
    entry.samples = gRows.slice().sort(function(a,b){ return a.Date < b.Date ? -1 : (a.Date > b.Date ? 1 : 0); });
    out.push(entry);
  }
  out.sort((a,b) => a.plant.localeCompare(b.plant));
  return out;
}

function grandTotalRow(rows){
  const entry = { plant: 'Grand Total', count: rows.length };
  for (const nut of NUTRIENTS) entry[nut] = mean(rows.map(r => r[nut]));
  return entry;
}

function fmt(v){ return (v === null || v === undefined) ? '\u2014' : v.toFixed(2); }

function populateYearOptions(){
  const years = Array.from(new Set(typeFiltered(state.type).map(r => r.Year))).sort((a,b)=>a-b);
  if (state.year !== 'All' && !years.includes(state.year)) state.year = 'All';
  const sel = document.getElementById('yearSel');
  sel.innerHTML = '<option value="All">All years</option>' + years.map(y => '<option value="'+y+'">'+y+'</option>').join('');
  sel.value = state.year;
}

function updateDateBounds(){
  const b = boundsFor(state.type, state.year);
  const startInput = document.getElementById('dateStart');
  const endInput = document.getElementById('dateEnd');
  startInput.min = b.min; startInput.max = b.max;
  endInput.min = b.min; endInput.max = b.max;
  if (state.dateStart === null || state.dateStart < b.min) state.dateStart = b.min;
  if (state.dateStart > b.max) state.dateStart = b.max;
  if (state.dateEnd === null || state.dateEnd > b.max) state.dateEnd = b.max;
  if (state.dateEnd < b.min) state.dateEnd = b.min;
  startInput.value = state.dateStart;
  endInput.value = state.dateEnd;
}

function populateStateOptions(){
  const rows = currentFilteredRows({ state: true, plant: true });
  const states = Array.from(new Set(rows.map(r => r.State))).sort();
  if (state.state !== 'All' && !states.includes(state.state)) state.state = 'All';
  const sel = document.getElementById('stateSel');
  sel.innerHTML = '<option value="All">All states</option>' + states.map(s => '<option value="'+s+'">'+s+'</option>').join('');
  sel.value = state.state;
}

function populatePlantOptions(){
  const rows = currentFilteredRows({ plant: true });
  const plants = Array.from(new Set(rows.map(r => r.Plant))).sort();
  if (state.plant !== 'All' && !plants.includes(state.plant)) state.plant = 'All';
  const sel = document.getElementById('plantSel');
  sel.innerHTML = '<option value="All">All plants</option>' + plants.map(p => '<option value="'+p+'">'+p+'</option>').join('');
  sel.value = state.plant;
}

function rowHtml(entry){
  let html = '<td>'+entry.plant+'</td><td>'+entry.count+'</td>';
  for (const n of NUTRIENTS){
    html += '<td>'+fmt(entry[n])+'</td>';
  }
  return html;
}

function sampleRowHtml(sample){
  let html = '<td>'+sample.Date+'</td><td>\u2014</td>';
  for (const n of NUTRIENTS){
    html += '<td>'+fmt(sample[n])+'</td>';
  }
  return html;
}

function renderResults(){
  const rows = currentFilteredRows({});
  const body = document.getElementById('tableBody');
  const summary = document.getElementById('resultSummary');

  if (rows.length === 0){
    body.innerHTML = '<tr><td colspan="13" class="empty-state">No samples match these filters.</td></tr>';
    summary.textContent = '0 samples';
    return;
  }

  const table = aggregateByPlant(rows);
  let html = '';
  table.forEach(function(e, i){
    const isExpanded = expandedPlants.has(e.plant);
    const altClass = (i % 2 === 1) ? ' alt' : '';
    const plantSafe = e.plant.replace(/"/g, '&quot;');
    html += '<tr class="plant-row'+altClass+(isExpanded ? ' expanded' : '')+'" data-plant="'+plantSafe+'">'
          + '<td><span class="chevron">\u25B8</span>'+e.plant+'</td><td>'+e.count+'</td>';
    for (const n of NUTRIENTS) html += '<td>'+fmt(e[n])+'</td>';
    html += '</tr>';
    if (isExpanded){
      html += e.samples.map(function(s){ return '<tr class="detail-row">'+sampleRowHtml(s)+'</tr>'; }).join('');
    }
  });
  if (table.length > 1){
    html += '<tr class="grand-total">'+rowHtml(grandTotalRow(rows))+'</tr>';
  }
  body.innerHTML = html;
  summary.textContent = rows.length + ' sample' + (rows.length===1?'':'s') + ' \u00b7 ' + table.length + ' plant' + (table.length===1?'':'s');
}

document.getElementById('tableBody').addEventListener('click', function(e){
  const row = e.target.closest('tr.plant-row');
  if (!row) return;
  const plant = row.dataset.plant;
  if (expandedPlants.has(plant)) { expandedPlants.delete(plant); } else { expandedPlants.add(plant); }
  renderResults();
});

function fullRerender(){
  populateYearOptions();
  updateDateBounds();
  populateStateOptions();
  populatePlantOptions();
  renderResults();
}

document.getElementById('typeSeg').addEventListener('click', function(e){
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('#typeSeg button').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  state.type = btn.dataset.type;
  state.dateStart = null;
  state.dateEnd = null;
  expandedPlants.clear();
  fullRerender();
});
document.getElementById('yearSel').addEventListener('change', function(e){
  state.year = e.target.value === 'All' ? 'All' : parseInt(e.target.value, 10);
  state.dateStart = null;
  state.dateEnd = null;
  expandedPlants.clear();
  updateDateBounds();
  populateStateOptions();
  populatePlantOptions();
  renderResults();
});
document.getElementById('dateStart').addEventListener('change', function(e){
  state.dateStart = e.target.value;
  expandedPlants.clear();
  populateStateOptions();
  populatePlantOptions();
  renderResults();
});
document.getElementById('dateEnd').addEventListener('change', function(e){
  state.dateEnd = e.target.value;
  expandedPlants.clear();
  populateStateOptions();
  populatePlantOptions();
  renderResults();
});
document.getElementById('stateSel').addEventListener('change', function(e){
  state.state = e.target.value;
  expandedPlants.clear();
  populatePlantOptions();
  renderResults();
});
document.getElementById('plantSel').addEventListener('change', function(e){
  state.plant = e.target.value;
  expandedPlants.clear();
  renderResults();
});

// ---- Supabase auth + data loading ----
// Fill in these two values from your project's API settings (Project Settings -> API).
const SUPABASE_URL = 'YOUR_PROJECT_URL';
const SUPABASE_ANON_KEY = 'YOUR_ANON_PUBLIC_KEY';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    storage: window.sessionStorage,
    persistSession: true,
    autoRefreshToken: true
  }
});

function mapRow(r){
  return {
    Date: r.sample_date, Type: r.type, Plant: r.plant, State: r.state, Year: r.year,
    'DM': r.dm, 'CP': r.cp, 'ADF': r.adf, 'NDF': r.ndf, 'Crude Fat': r.crude_fat,
    'Ash': r.ash, 'Ca': r.ca, 'P': r.p, 'Mg': r.mg, 'K': r.k, 'S': r.s
  };
}

async function loadDataFromSupabase(){
  const loading = document.getElementById('loginLoading');
  if (loading) loading.textContent = 'Loading data...';
  const { data, error } = await sb.from('byproduct_samples').select('*');
  if (error){
    console.error(error);
    return false;
  }
  DATA = data.map(mapRow);
  if (loading) loading.textContent = '';
  return true;
}

function showApp(){
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('appRoot').classList.remove('app-hidden');
}

function showLogin(){
  document.getElementById('appRoot').classList.add('app-hidden');
  document.getElementById('loginWrap').style.display = '';
}

async function attemptLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errEl.textContent = '';
  if (!email || !password){
    errEl.textContent = 'Enter your email and password.';
    return;
  }
  btn.disabled = true;
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  btn.disabled = false;
  if (error){
    errEl.textContent = 'Incorrect email or password.';
    return;
  }
  const ok = await loadDataFromSupabase();
  if (!ok){
    errEl.textContent = 'Signed in, but could not load data. Try reloading the page.';
    return;
  }
  showApp();
  fullRerender();
}

document.getElementById('loginBtn').addEventListener('click', attemptLogin);
document.getElementById('loginPassword').addEventListener('keydown', function(e){
  if (e.key === 'Enter') attemptLogin();
});
document.getElementById('logoutBtn').addEventListener('click', async function(){
  await sb.auth.signOut();
  DATA = [];
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPassword').value = '';
  showLogin();
});

// On page load, if there's already a valid session (from a previous visit), skip the login form.
(async function initAuth(){
  const { data: { session } } = await sb.auth.getSession();
  if (session){
    const ok = await loadDataFromSupabase();
    if (ok){ showApp(); fullRerender(); return; }
  }
  showLogin();
})();
</script>
</body>
</html>
